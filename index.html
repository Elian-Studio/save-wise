<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- 구글 서치콘솔 소유 확인 -->
    <meta name="google-site-verification" content="l_whixRLi4AVay_uSzURnhAxWnBUA_b4COQnngayD98" />
    <!-- 네이버 웹마스터 도구 소유 확인 -->
    <meta name="naver-site-verification" content="eb00ead57ff83eaf1b1faf9be3a77c616f4f764b" />
    <!-- AdSense 사이트 인증 (소유자 본인 계정으로 확인됨) -->
    <meta name="google-adsense-account" content="ca-pub-7278925724289481" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (전역 공통). 라우트별 title·description·keywords·canonical·og:title/description/url·JSON-LD은
         빌드 타임 프리렌더(scripts/prerender.mjs)가 </head> 직전에 주입한다. -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="choicewise" />
    <meta property="og:image" content="https://choicewise.kr/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="choicewise — 내 조건으로 비교하는 금융 결정 계산기" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://choicewise.kr/og.jpg" />

    <!-- 전역 사이트·발행처 구조화 데이터 (브랜드·E-E-A-T 신호) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "choicewise",
        "url": "https://choicewise.kr/",
        "inLanguage": "ko-KR",
        "publisher": {
          "@type": "Organization",
          "name": "choicewise",
          "url": "https://choicewise.kr/"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
